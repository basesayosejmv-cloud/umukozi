services:
  - type: web
    name: umukozi-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_database.py && gunicorn app:app --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: umukozi-db
          property: connectionString
      - key: PORT
        value: 10000
    plan: free

databases:
  - name: umukozi-db
    databaseName: umukozi_db
    user: umukozi_user
    plan: free
